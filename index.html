<style>

    edges:()=>D.ship.map(e=>({a:e.a,b:e.b,w:e.w,kud:e.kud,rom:e.rom})),
    edgeStyle:"ship" },
  tone: { label:"Tone lens (AO3)", tone:"t",
    desc:"Re-weight the ship graph by how the fandom tags it. Pick a tone; hotter = more works carrying that tag.",
    edges:()=>{ const k=toneIdx(); return D.tone.map(e=>{ let v=e.t[k];
        if(normRate) v = e.n? v/e.n : 0; return {a:e.a,b:e.b,w:v,val:e.t[k],n:e.n}; }); },
    edgeStyle:"heat" },
  opp: { label:"Opportunity (gap)", tone:false,
    desc:"Strong in canon but thin on AO3 — underwritten pairings with canon support. Hotter = bigger gap. Hover for canon vs AO3 counts.",
    edges:()=>D.opp.map(e=>({a:e.a,b:e.b,w:e.w,cw:e.cw,aw:e.aw})),
    edgeStyle:"heat" },
  canontone: { label:"Canon tone", tone:"ct",
    desc:"Tone scored from the actual transcript dialogue between each pair (heuristic, keyword-based). Pick an axis; hotter = more of it.",
    edges:()=>{ const k=ctIdx(); return D.canontone.map(e=>{ let v=e.t[k];
        if(normRate) v = e.n? v/e.n : 0; return {a:e.a,b:e.b,w:v,val:e.t[k],n:e.n}; }); },
    edgeStyle:"heat" },
};
const MODEORDER = ["canon","ship","tone","opp","canontone"];
let mode = "canon", normRate = false;
let links = [], neigh = nodes.map(()=>new Set()), curMax = 1, maxVdeg = 1;

function toneIdx(){ return TKEYS.indexOf(document.getElementById('tone').value); }
function ctIdx(){ return CTKEYS.indexOf(document.getElementById('tone').value); }

function heat(t){ // t in 0..1 -> blue→cyan→amber→red
  t=Math.max(0,Math.min(1,t));
  const stops=[[43,89,195],[34,211,238],[234,179,8],[249,115,22],[239,68,68]];
  const x=t*(stops.length-1), i=Math.floor(x), f=x-i, a=stops[i], b=stops[Math.min(i+1,stops.length-1)];
  return `rgb(${a[0]+(b[0]-a[0])*f|0},${a[1]+(b[1]-a[1])*f|0},${a[2]+(b[2]-a[2])*f|0})`;
}

function recompute(){
  const raw = MODES[mode].edges();
  curMax = raw.reduce((m,e)=>Math.max(m,e.w),0) || 1;
  const thr = (+document.getElementById('thr').value/100)*curMax;
  links = raw.filter(e=>e.w>=thr && e.w>0 && e.a!==e.b);
  nodes.forEach(n=>{ n.vdeg=0; n.vcount=0; });
  neigh = nodes.map(()=>new Set());
  for(const l of links){ const A=nodes[l.a], B=nodes[l.b];
    A.vdeg+=l.w; B.vdeg+=l.w; A.vcount++; B.vcount++;
    neigh[l.a].add(l.b); neigh[l.b].add(l.a); }
  maxVdeg = nodes.reduce((m,n)=>Math.max(m,n.vdeg),0) || 1;
  // separate webs
  const par=nodes.map((_,i)=>i), find=x=>{ while(par[x]!==x){par[x]=par[par[x]];x=par[x];} return x; };
  for(const l of links){ const a=find(l.a), b=find(l.b); if(a!==b) par[a]=b; }
  const roots=new Set(); nodes.forEach((n,i)=>{ if(n.vdeg>0) roots.add(find(i)); });
  const conn=nodes.filter(n=>n.vdeg>0).length;
  document.getElementById('thrv').textContent =
    (MODES[mode].tone && normRate) ? (thr).toFixed(2) : Math.round(thr);
  document.getElementById('stat').innerHTML =
    `<b>${conn}</b> shown · <b>${links.length}</b> links · <b>${roots.size}</b> web${roots.size===1?'':'s'}`;
  alpha = Math.max(alpha, .5);
  renderLegend();
}
const radius = n => 3.5 + 11*Math.sqrt(n.vdeg/maxVdeg);

// ---- physics (tuned: capped repulsion, clamped speed, gentle reheat, quick cooldown) ----
function step(){
  if(alpha < .02) return;
  const cx=W/2, cy=H/2;
  for(let i=0;i<nodes.length;i++){ const a=nodes[i]; if(a.vdeg===0 && a!==selNode) continue;
    for(let j=i+1;j<nodes.length;j++){ const b=nodes[j]; if(b.vdeg===0 && b!==selNode) continue;
      let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy+0.01; if(d2>90000) continue;
      const f=Math.min(45,2600/d2), d=Math.sqrt(d2); dx/=d; dy/=d;
      a.vx+=dx*f; a.vy+=dy*f; b.vx-=dx*f; b.vy-=dy*f; } }
  for(const l of links){ const a=nodes[l.a], b=nodes[l.b];
    let dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)+.01;
    const str=l.w/curMax;                         // 0..1 relative pull
    const len=Math.max(36, 200-120*str);
    const f=(d-len)*0.0016*(0.4+1.6*str);
    dx/=d; dy/=d; a.vx+=dx*f; a.vy+=dy*f; b.vx-=dx*f; b.vy-=dy*f; }
  for(const n of nodes){ if(n.vdeg===0) continue;
    n.vx += (cx-n.x)*0.0016; n.vy += (cy-n.y)*0.0016;
    if(n===dragNode) continue;
    n.vx*=0.86; n.vy*=0.86;
    const sp=Math.sqrt(n.vx*n.vx+n.vy*n.vy), MAX=22;
    if(sp>MAX){ n.vx*=MAX/sp; n.vy*=MAX/sp; }
    n.x += n.vx*alpha*2.2; n.y += n.vy*alpha*2.2; }
  alpha *= 0.975;
}

// ---- render ----
function W2S(x,y){ return [x*view.s+view.tx, y*view.s+view.ty]; }
function S2W(x,y){ return [(x-view.tx)/view.s, (y-view.ty)/view.s]; }
function edgeColor(l){
  const st=MODES[mode].edgeStyle;
  if(st==="ship") return l.rom ? "rgba(244,114,182,OP" : "rgba(148,163,184,OP";
  if(st==="heat"){ const c=heat(l.w/curMax); return c.replace('rgb(','rgba(').replace(')',',OP'); }
  return "rgba(150,165,200,OP"; // slate
}
function draw(){
  ctx.clearRect(0,0,W,H);
  const hi=hoverNode;
  ctx.lineCap='round';
  for(const l of links){
    const a=nodes[l.a], b=nodes[l.b];
    const [ax,ay]=W2S(a.x,a.y), [bx,by]=W2S(b.x,b.y);
    let op = 0.14 + 0.55*(l.w/curMax);
    if(hi){ op = (l.a===hi.i||l.b===hi.i)? 0.9 : 0.035; }
    ctx.strokeStyle = edgeColor(l).replace('OP', op.toFixed(3)+')');
    ctx.lineWidth = Math.max(.5, 0.6+3.2*(l.w/curMax))*Math.min(2,view.s);
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
  }
  ctx.font='10px -apple-system,Segoe UI,Roboto,sans-serif';
  for(let i=0;i<nodes.length;i++){
    const n=nodes[i]; if(n.vdeg===0 && n!==selNode) continue;
    const [sx,sy]=W2S(n.x,n.y), r=radius(n)*Math.sqrt(view.s);
    let dim=false;
    if(hi) dim = !(i===hi.i || neigh[hi.i].has(i));
    if(searchHit) dim = !searchHit.has(i);
    ctx.globalAlpha = dim?0.12:1;
    ctx.beginPath(); ctx.arc(sx,sy,Math.max(2.5,r),0,7);
    ctx.fillStyle=ncolor(n); ctx.fill();
    ctx.lineWidth=(n===selNode)?2.5:1.2; ctx.strokeStyle=(n===selNode)?'#fff':'#0f1117'; ctx.stroke();
    const big = n.vdeg>maxVdeg*0.32 || view.s>1.4 || i===(hi&&hi.i) || n===selNode || (hi&&neigh[hi.i].has(i));
    if(big && !dim){
      ctx.globalAlpha=0.95;
      ctx.fillStyle='#0b0d13'; ctx.lineWidth=3; ctx.strokeStyle='#0b0d13';
      ctx.strokeText(n.name, sx+r+3, sy+3);
      ctx.fillStyle='#e8eaf0'; ctx.fillText(n.name, sx+r+3, sy+3);
    }
  }
  ctx.globalAlpha=1;
}
function loop(){ step(); draw(); requestAnimationFrame(loop); }

// ---- per-edge labelling (tooltip + detail) ----
function edgeMetric(l){
  if(mode==='canon') return `${l.w}`;
  if(mode==='ship') return `${l.w} works · ${l.kud}♡`;
  if(mode==='opp') return `canon ${l.cw} / AO3 ${l.aw}`;
  if(mode==='tone'||mode==='canontone')
    return normRate ? `${(l.w).toFixed(2)}/ex (${l.val})` : `${l.val}`;
  return `${l.w}`;
}

// ---- interaction ----
function pick(mx,my){ let best=null, bd=1e9;
  for(let i=0;i<nodes.length;i++){ const n=nodes[i]; if(n.vdeg===0 && n!==selNode) continue;
    const [sx,sy]=W2S(n.x,n.y); const d=(sx-mx)**2+(sy-my)**2;
    const rr=Math.max(7,radius(n)*Math.sqrt(view.s)+4); if(d<rr*rr && d<bd){ bd=d; best={n,i}; } }
  return best; }
let panning=false, panStart=null, downPt=null, moved=false;
cv.addEventListener('mousedown',e=>{ downPt=[e.clientX,e.clientY]; moved=false;
  const hit=pick(e.clientX,e.clientY);
  if(hit){ dragNode=hit.n; alpha=Math.max(alpha,.5); }
  else { panning=true; panStart=[e.clientX-view.tx, e.clientY-view.ty]; } });
window.addEventListener('mousemove',e=>{
  if(downPt && (Math.abs(e.clientX-downPt[0])+Math.abs(e.clientY-downPt[1])>3)) moved=true;
  if(dragNode){ const [wx,wy]=S2W(e.clientX,e.clientY); dragNode.x=wx; dragNode.y=wy; dragNode.vx=0; dragNode.vy=0; }
  else if(panning){ view.tx=e.clientX-panStart[0]; view.ty=e.clientY-panStart[1]; }
  else { const hit=pick(e.clientX,e.clientY); hoverNode=hit?{...hit,i:hit.i}:null;
    const tip=document.getElementById('tip');
    if(hit){ tip.style.opacity=1; tip.style.left=(e.clientX+12)+'px'; tip.style.top=(e.clientY+12)+'px';
      tip.textContent=hit.n.name+' · '+hit.n.vcount+' links'; } else tip.style.opacity=0; } });
window.addEventListener('mouseup',e=>{
  if(dragNode){ dragNode=null; }
  if(panning){ panning=false; }
  if(!moved){ const hit=pick(e.clientX,e.clientY); if(hit){ selNode=hit.n; showSel(hit.n); } }
  downPt=null; });
cv.addEventListener('wheel',e=>{ e.preventDefault();
  const f=Math.exp(-e.deltaY*0.0015); const [wx,wy]=S2W(e.clientX,e.clientY);
  view.s=Math.max(0.25,Math.min(5,view.s*f));
  view.tx=e.clientX-wx*view.s; view.ty=e.clientY-wy*view.s; }, {passive:false});

function showSel(n){
  const i=n.i;
  const conns=links.filter(l=>l.a===i||l.b===i)
    .map(l=>({other:l.a===i?l.b:l.a, l})).sort((p,q)=>q.l.w-p.l.w);
  let h=`<h2><span class="swatch" style="background:${ncolor(n)}"></span>${n.name}</h2>`;
  if(n.comm>=0) h+=`<div class="row"><span>cluster</span><b>${COMMLABEL[n.comm]}</b></div>`;
  h+=`<div class="row"><span>connections (this view)</span><b>${conns.length}</b></div>`;
  h+=conns.map(c=>`<div class="row"><span>${nodes[c.other].name}</span><b>${edgeMetric(c.l)}</b></div>`).join('');
  document.getElementById('sel').innerHTML=h;
}

// ---- legend ----
function renderLegend(){
  const L=document.getElementById('legend'); const st=MODES[mode].edgeStyle;
  if(st==="slate"){
    const counts={}; nodes.forEach(n=>{ if(n.comm>=0) counts[n.comm]=(counts[n.comm]||0)+1; });
    L.innerHTML='<div style="color:var(--mut);margin-bottom:5px">Communities (node colour)</div>'+
      Object.keys(COMMLABEL).filter(c=>counts[c]).sort((a,b)=>counts[b]-counts[a])
       .map(c=>`<div class="lg" data-c="${c}"><span class="swatch" style="background:${PALETTE[c%PALETTE.length]}"></span>${COMMLABEL[c]} <span style="opacity:.55;margin-left:4px">(${counts[c]})</span></div>`).join('');
    wireLegend();
  } else if(st==="ship"){
    L.innerHTML='<div style="color:var(--mut);margin-bottom:5px">Edge colour</div>'+
      '<div class="lg"><span class="swatch" style="background:#f472b6"></span>Romantic ( / )</div>'+
      '<div class="lg"><span class="swatch" style="background:#94a3b8"></span>Platonic ( &amp; )</div>'+
      '<div style="color:var(--mut);margin-top:7px">Node &amp; edge size = number of AO3 works.</div>';
  } else {
    const lab = mode==='opp' ? 'Gap (canon ÷ AO3 works)'
      : (mode==='tone'? TLABEL[document.getElementById('tone').value]
                      : CTLABEL[document.getElementById('tone').value])
        + (normRate?' — per exchange':' — total');
    L.innerHTML=`<div style="color:var(--mut);margin-bottom:3px">${lab}</div>`+
      '<div class="ramp"></div><div class="rlab"><span>low</span><span>high</span></div>'+
      (mode!=='opp'?'<div style="color:var(--mut);margin-top:6px">Node colour = community.</div>':
        '<div style="color:var(--mut);margin-top:6px">Thick/hot = lots of canon material, few works written.</div>');
  }
}
function wireLegend(){
  const L=document.getElementById('legend');
  L.querySelectorAll('.lg[data-c]').forEach(el=>{
    el.addEventListener('mouseenter',()=>{ const c=+el.dataset.c; searchHit=new Set();
      nodes.forEach((n,i)=>{ if(n.comm===c) searchHit.add(i); }); });
    el.addEventListener('mouseleave',()=>{ searchHit=null; }); });
}

// ---- tabs / controls ----
const tabsEl=document.getElementById('tabs');
MODEORDER.forEach(m=>{ const b=document.createElement('button');
  b.className='tab'+(m===mode?' on':''); b.textContent=MODES[m].label; b.dataset.m=m;
  b.onclick=()=>switchMode(m); tabsEl.appendChild(b); });

function populateTone(){
  const sel=document.getElementById('tone');
  const keys = mode==='tone'? TKEYS : CTKEYS;
  const lab = mode==='tone'? TLABEL : CTLABEL;
  sel.innerHTML = keys.map(k=>`<option value="${k}">${lab[k]}</option>`).join('');
}
function switchMode(m){
  mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.m===m));
  document.getElementById('desc').textContent=MODES[m].desc;
  const tw=document.getElementById('tonewrap');
  if(MODES[m].tone){ tw.classList.remove('hidden'); populateTone(); }
  else tw.classList.add('hidden');
  document.getElementById('thrlab').textContent =
    m==='ship'?'Min works': m==='opp'?'Min gap': m==='canon'?'Min shared lines':'Min strength';
  selNode=null; document.getElementById('sel').innerHTML='<p class="hint">Click a node to see her strongest connections.</p>';
  alpha=1; recompute();
}
document.getElementById('thr').addEventListener('input',recompute);
document.getElementById('tone').addEventListener('change',()=>{ alpha=Math.max(alpha,.55); recompute(); });
document.getElementById('normseg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  normRate = b.dataset.n==='1';
  document.querySelectorAll('#normseg button').forEach(x=>x.classList.toggle('on',x===b));
  alpha=Math.max(alpha,.55); recompute(); });
document.getElementById('q').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  if(!q){ searchHit=null; return; }
  searchHit=new Set(); nodes.forEach((n,i)=>{ if(n.name.toLowerCase().includes(q)) searchHit.add(i); }); });
window.addEventListener('resize',resize);

switchMode('canon'); loop();
</script>
</body>
</html>
